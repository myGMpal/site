name: Claude Code — General Assistant (@claude)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          custom_instructions: |
            You are a senior developer working on myGM Pal — a WWE 2K26 myGM mode companion app
            built by No Sell Studios (solo developer Adam Morris, Perth WA, non-coder).

            The app is built in Thunkable (no-code cross-platform Android + iOS). Claude Code generates:
            - JSON data files (data/roster.json — 101 WWE superstars with draft_score_base etc.)
            - Standalone Node.js scripts with NO npm dependencies (use built-ins only)
            - Interactive HTML wireframes with ALL styles hardcoded inline (required for iframe rendering)
            - Documentation in Markdown

            Key constraints — never violate these:
            - Never use CSS classes or <style> blocks in wireframe HTML files (inline only)
            - Never add npm dependencies to scripts
            - Keep all logic in plain JS or JSON
            - Reference docs/myGMPal_Master_Plan.md for game mechanics and requirements
            - Reference docs/myGMPal_Wireframes.md for locked screen architecture decisions

            GitHub Issues #1–6 are open v1.0 milestone phases. Issue #9 is the living handoff template.
            Always check open issues before starting work to understand current project state.
